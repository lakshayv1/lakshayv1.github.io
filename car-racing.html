<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Racing Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #222;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            text-align: center;
        }
        canvas {
            border: 3px solid #fff;
            background: #333;
        }
        #score {
            color: #fff;
            font-size: 24px;
            margin-top: 10px;
        }
        #gameOver {
            display: none;
            color: #ff4444;
            font-size: 32px;
            margin-top: 20px;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="score">Score: 0</div>
        <div id="gameOver">Game Over!</div>
        <button id="restartBtn" style="display:none;">Restart</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const gameOverEl = document.getElementById('gameOver');
        const restartBtn = document.getElementById('restartBtn');

        let gameRunning = false;
        let score = 0;
        let gameSpeed = 3;

        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 120,
            width: 50,
            height: 80,
            speed: 5
        };

        const keys = {};
        const obstacles = [];
        const roadLines = [];

        function init() {
            gameRunning = true;
            score = 0;
            gameSpeed = 3;
            obstacles.length = 0;
            roadLines.length = 0;
            player.x = canvas.width / 2 - 25;
            gameOverEl.style.display = 'none';
            restartBtn.style.display = 'none';
            
            for (let i = 0; i < 6; i++) {
                roadLines.push({ y: i * 120 });
            }
            
            gameLoop();
        }

        function drawPlayer() {
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x + 10, player.y + 10, 10, 20);
            ctx.fillRect(player.x + 30, player.y + 10, 10, 20);
        }

        function drawObstacle(obs) {
            ctx.fillStyle = obs.color;
            ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            ctx.fillStyle = '#333';
            ctx.fillRect(obs.x + 10, obs.y + 10, 10, 20);
            ctx.fillRect(obs.x + 30, obs.y + 10, 10, 20);
        }

        function drawRoad() {
            ctx.fillStyle = '#555';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 5;
            ctx.setLineDash([20, 15]);
            
            roadLines.forEach(line => {
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2, line.y);
                ctx.lineTo(canvas.width / 2, line.y + 60);
                ctx.stroke();
            });
            
            ctx.setLineDash([]);
        }

        function updateRoadLines() {
            roadLines.forEach(line => {
                line.y += gameSpeed;
                if (line.y > canvas.height) {
                    line.y = -60;
                }
            });
        }

        function createObstacle() {
            const lanes = [50, 175, 300];
            const lane = lanes[Math.floor(Math.random() * lanes.length)];
            obstacles.push({
                x: lane,
                y: -100,
                width: 50,
                height: 80,
                color: `hsl(${Math.random() * 360}, 70%, 50%)`
            });
        }

        function updateObstacles() {
            obstacles.forEach((obs, index) => {
                obs.y += gameSpeed;
                
                if (obs.y > canvas.height) {
                    obstacles.splice(index, 1);
                    score += 10;
                    scoreEl.textContent = `Score: ${score}`;
                    
                    if (score % 50 === 0) {
                        gameSpeed += 0.5;
                    }
                }
                
                if (checkCollision(player, obs)) {
                    endGame();
                }
            });
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function updatePlayer() {
            if (keys['ArrowLeft'] && player.x > 0) {
                player.x -= player.speed;
            }
            if (keys['ArrowRight'] && player.x < canvas.width - player.width) {
                player.x += player.speed;
            }
        }

        function endGame() {
            gameRunning = false;
            gameOverEl.style.display = 'block';
            restartBtn.style.display = 'inline-block';
        }

        let frameCount = 0;
        function gameLoop() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawRoad();
            updateRoadLines();
            updatePlayer();
            drawPlayer();
            
            frameCount++;
            if (frameCount % 60 === 0) {
                createObstacle();
            }
            
            updateObstacles();
            obstacles.forEach(drawObstacle);
            
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        restartBtn.addEventListener('click', init);

        init();
    </script>
</body>
</html>
