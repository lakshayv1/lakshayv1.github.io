<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#00113a",
                        "background": "#fcf9f8",
                        "surface": "#fcf9f8",
                        "on-surface": "#1c1b1b",
                        "on-primary": "#ffffff",
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                    }
                },
            },
        }
    </script>
</head>

<body class="bg-background text-on-background font-body">
    <nav
        class="fixed top-0 w-full z-50 bg-[#fcf9f8]/80 backdrop-blur-md shadow-sm flex items-center justify-between px-10 py-5">
        <div class="text-2xl font-black tracking-tighter text-[#00113a] uppercase">ATELIER</div>
        <div class="hidden md:flex items-center space-x-12">
            <a class="font-inter tracking-tight text-sm uppercase font-medium text-[#1c1b1b]/60 hover:text-[#00113a] transition-all"
                href="homepage.html">Home</a>
            <a class="font-inter tracking-tight text-sm uppercase font-medium text-[#1c1b1b]/60 hover:text-[#00113a] transition-all"
                href="PRODUCT_CATALOGUE.HTML">Catalogue</a>
            <a class="font-inter tracking-tight text-sm uppercase font-medium text-[#1c1b1b]/60 hover:text-[#00113a] transition-all"
                href="PRODUCT.HTML">Product</a>
            <a class="font-inter tracking-tight text-sm uppercase font-medium text-[#1c1b1b]/60 hover:text-[#00113a] transition-all"
                href="CRM.HTML">CRM</a>
            <a class="font-inter tracking-tight text-sm uppercase font-medium text-[#00113a] border-b-2 border-[#00113a] pb-1 transition-all"
                href="CARD&amp;CHECKOUT.HTML">Checkout</a>
        </div>
        <div class="flex items-center space-x-6">
            <button class="material-symbols-outlined">search</button>
            <button class="material-symbols-outlined">person</button>
            <button class="material-symbols-outlined">shopping_bag</button>
        </div>
    </nav>

    <main class="pt-32 container mx-auto px-10">
        <h1 class="text-6xl font-black tracking-tighter text-primary mb-12">YOUR SELECTION</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
            <div class="lg:col-span-8">
                <div class="border-t border-gray-200">
                    <div class="py-8 flex items-center justify-between border-b border-gray-100">
                        <div class="flex items-center space-x-6">
                            <div class="w-24 h-32 bg-gray-100"></div>
                            <div>
                                <h4 class="font-bold uppercase text-primary">Sculptural Column Dress</h4>
                                <p class="text-xs text-gray-500 uppercase tracking-widest mt-1">Size: M | Color: Bone</p>
                            </div>
                        </div>
                        <p class="font-bold text-primary">$420</p>
                    </div>
                </div>
            </div>
            <div class="lg:col-span-4">
                <div class="bg-gray-50 p-10">
                    <h3 class="font-black uppercase tracking-widest text-sm mb-8">Summary</h3>
                    <div class="flex justify-between mb-4 text-sm">
                        <span>Subtotal</span>
                        <span>$420</span>
                    </div>
                    <div class="flex justify-between mb-8 text-sm">
                        <span>Shipping</span>
                        <span class="uppercase">Calculated at checkout</span>
                    </div>
                    <div class="border-t border-gray-200 pt-8 flex justify-between items-end mb-10">
                        <span class="text-xs uppercase font-bold tracking-widest">Total</span>
                        <span class="text-2xl font-black text-primary">$420</span>
                    </div>
                    <button class="w-full bg-primary text-white py-5 uppercase font-bold tracking-widest hover:bg-opacity-90 transition-all">
                        Checkout
                    </button>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
